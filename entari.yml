# yaml-language-server: $schema=./entari.schema.json

basic:
  prefix:
    - /
  log:
    level: debug
    ignores:
      - "aiosqlite.core"
      - "asyncio.selector_events"
  schema: true
plugins:
  ::echo: {}
  ::inspect: {}
  ::help: {}
  ::norris: {}
  server:
    port: 8765
    path: "satori"
    direct_adapter: true
  database:
    name: .entari/database.db
  webui: {}
